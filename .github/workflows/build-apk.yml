name: Build Android APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Prebuild Expo Android
        run: npx expo prebuild -p android

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk OfflineNotes.apk

      - name: Release APK
        uses: softprops/action-gh-release@v1
        with:
          files: OfflineNotes.apk
          tag_name: latest
          name: Latest Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
