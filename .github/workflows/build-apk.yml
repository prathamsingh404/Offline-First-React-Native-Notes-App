name: Build Android APK
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Prebuild Expo Android
        run: npx expo prebuild -p android --clean

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk OfflineNotes.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: OfflineNotes.apk
          tag_name: v1.0.0
          name: OfflineNotes v1.0.0
          body: |
            ## Offline-First Notes App — Android APK

            Download `OfflineNotes.apk` below, install it on your Android device, and open the app.
            No internet, no Metro server, no USB debugging required.
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
